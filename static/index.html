<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Traffic Object Detection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="hero text-white text-center">
        <div class="container py-5">
            <i class="bi bi-signpost-split display-4"></i>
            <h1 class="mt-2 mb-1">Traffic Object Detection</h1>
            <p class="mb-0 opacity-90">YOLO11 detector for Bikes, Buses, Cars, Motorbikes &amp; Trucks</p>
        </div>
    </header>

    <div class="container content-wrap">

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
                <h2 class="card-title h5 mb-1"><i class="bi bi-upload me-2 text-primary"></i>Detect on an image or video</h2>
                <p class="card-text text-muted">Upload a file to see the model draw bounding boxes and count objects.</p>

                <form id="upload-form" class="row g-2 align-items-center mt-3">
                    <div class="col-12 col-md-8">
                        <input type="file" id="file-input" name="file" class="form-control" accept="image/*,video/*" required>
                    </div>
                    <div class="col-12 col-md-4">
                        <button type="submit" class="btn btn-primary w-100" id="detect-btn">
                            <span class="spinner-border spinner-border-sm d-none" id="spinner"></span>
                            <span id="btn-label"><i class="bi bi-search me-1"></i>Detect</span>
                        </button>
                    </div>
                </form>

                <div id="error" class="alert alert-danger mt-3 d-none"></div>

                <div id="result" class="mt-4 d-none">
                    <hr>
                    <h3 class="h6 text-uppercase text-muted">Result</h3>
                    <img id="result-image" class="img-fluid rounded-3 shadow-sm d-none" alt="Detection result">
                    <video id="result-video" class="w-100 rounded-3 shadow-sm d-none" controls></video>

                    <div class="row mt-3 g-2" id="detect-badges"></div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-5">
            <div class="card-body p-4">
                <h2 class="card-title h5 mb-3"><i class="bi bi-bar-chart-fill me-2 text-primary"></i>Dataset stats</h2>

                <div class="row mb-4 g-3" id="split-counts"></div>

                <div class="row g-4 align-items-center">
                    <div class="col-lg-7">
                        <canvas id="class-chart" height="260"></canvas>
                    </div>
                    <div class="col-lg-5">
                        <table class="table table-sm align-middle" id="class-table">
                            <thead><tr><th>Class</th><th class="text-end">Count (train)</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <h3 class="h6 text-uppercase text-muted mt-4">Training figures</h3>
                <div class="row g-3" id="figures-row"></div>
            </div>
        </div>

    </div>

    <footer class="text-center text-muted small py-4">
        Traffic Object Detection &middot; YOLO11
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
